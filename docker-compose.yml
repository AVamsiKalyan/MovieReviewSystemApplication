version: '3.8'

services:
  backend:
    build:
      context: ./moviereview
      dockerfile: Dockerfile
    container_name: moviereview-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/moviereview
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      - mysql
    networks:
      - moviereview-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: moviereview-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - backend
    networks:
      - moviereview-network

  mysql:
    image: mysql:8.0
    container_name: moviereview-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: moviereview
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - moviereview-network

volumes:
  mysql_data:

networks:
  moviereview-network:
    driver: bridge
